<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table,th,td{
             border:1px solid black;
              border-collapse: collapse;
        }
        table{
             width:400px;
             height:40px;
        }
    </style>
</head>
<body>
    
   <!--<table border=""1  cellspacing="5px" cellpadding="10px">-->
    <table>
        <thead>
            <tr>
                <th>SNO</th>
                <th>NAME</th>
                <th>PHONE</th>
                
            </tr>
        </thead>
        <tbody>
            <tr>
            <td>1</td>
            <td>AZEEz</td>
            <td>8919217725</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Harish</td>
                <td>9948147722</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
<!--table----for table structure
    thead---for table head
    tbody---for table data/body
    tr----for table row
    td----for table data(normal cell)
    th----for table header cell(bold and centered)
    cell spacing--space between cell to cell
    cell padding--space between cell content and border-->
