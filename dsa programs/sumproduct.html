    <title>sumproduct</title>
</head>
<body>
    <script>
        let num=153;
        function sumdigit(num)
        {
            let sum=0;
            let temp=num;
            while(num>0)
        {
            let rem=num%10;
            sum=sum+rem;
            num=Math.floor(num/10);
        }
        console.log("sum of digits in",temp,"is" ,sum);
        }
        function productofdigit(num)
        {let product=1;
            let temp=num;
            while(num>0)
        {
            let rem=num%10;
            product=product*rem;
            num=Math.floor(num/10);
        }
        console.log("product of digits in",temp,"is" ,product);

        }
        sumdigit(num);
        setTimeout(() => {
            productofdigit(num);
        }, 5000);
    </script>
</body>
