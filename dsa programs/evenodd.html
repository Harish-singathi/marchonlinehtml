<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>even odd numbers</title>
</head>
<body>
    <script>
        function evenodd(num)
        {
            if(num%2==0)
        {
            console.log(num,'is a even number');
        }
        else{
            console.log(num,'is a odd number');
        }
        }
        for(let num=1;num<=10;num++)
        {
            evenodd(num);
        }
    </script>
</body>
</html>
