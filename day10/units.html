<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>units</title>
    <style>
        .p1{
                background-color: red;
                width:100px;
        }
        .p2
        {
            background-color: green;
            width:40%;
        }
        .parent
        {
            border:1px solid black;
            width:700%;
        }
    </style>
</head>
<body>
    <p class="p1">100px</p>
    <p class="p2">40%</p>
    <div class="parent">
         <p class="p1">100px</p>
    <p class="p2">40%</p>
    </div>
    
</body>
</html>
