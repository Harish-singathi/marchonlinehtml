    <title>styling</title>
    <style>
        div{
            color: brown;
        }

    </style>
     <link rel="stylesheet" href="style.css">

<!--css -cascading style sheet
          1.inline styling-with in tag
          we use style attribute 
          style="propertyname=value"
          2.internal styling - need to  use style tag
          <style>
             selector/elementname
             {propertyname:value;
             propertyname:value;}
          </style>
          3.external styling---link tag
          <link rel="stylesheet" href="location of css file">
          ----css file will be created with .css extension
          selector/elementname
             {propertyname:value;
             propertyname:value;}
             }-->
