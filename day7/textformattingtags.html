<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text formatting tags</title>
    <style>
        marquee{
            border:1px solid black;
            height:40px;
            margin:10px;
        }
    </style>
</head>
<body>
    <details>
        
        <summary>
            HTML
        </summary>
            <p>Hyper Text Markup Language</p>
            <br><br>
            <!--html entities-- for special characters-->
            <p> 5 &lt; 3</p>
            <p> &copy;</p>
        
    </details>
    <!--default direction is left-->
    <marquee behaviour="" direction=""  bgcolor="yellow" scrollamount="50">Element</marquee>
     <marquee behaviour="" direction="left">Element</marquee>
      <marquee behaviour="" direction="right">Element</marquee>
       <marquee behaviour="" direction="up">Element</marquee>
        <marquee behaviour="" direction="down">Element</marquee>
        <hr>
     <marquee behaviour="" direction="">Element</marquee>
         <marquee behaviour="scroll" direction="">scroll</marquee>
             <marquee behaviour="slide" direction="">slide</marquee>
                 <marquee behaviour="alternate" direction="">alternate</marquee>

</body>
</html>
